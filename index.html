<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mindful</title>
    <meta
      name="description"
      content="Mindful is a short-form audio experience for calm focus, clarity, and daily consistency."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape shape-a"></div>
    <div class="bg-shape shape-b"></div>
    <div class="bg-shape shape-c"></div>

    <div class="container">
      <header class="topbar card">
        <div class="brand-lockup">
          <h1>Mindful</h1>
          <p class="brand-tagline">Short wisdom episodes for calm, focus, and clarity.</p>
        </div>
        <div class="topbar-actions">
          <div id="authArea" class="auth-area"></div>
          <button id="openPreferences" class="ghost-btn" type="button" data-action="open-preferences" hidden>
            Preferences
          </button>
          <button id="resetProfile" class="ghost-btn" type="button">Reset Profile</button>
        </div>
      </header>

      <main id="app"></main>
    </div>

    <div id="episodeModal" class="modal hidden" aria-hidden="true"></div>
    <div id="playerDock" class="player-dock hidden"></div>
    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
